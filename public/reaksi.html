<!DOCTYPE html>
<html>
<head>
  <title>Reaksi -  Live Presentation</title>
  <link rel="icon" href="assets/icon.png">
  <script src="/socket.io/socket.io.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

<style>
  .pop {
    position: fixed;
    font-size: 30px;
    animation: popUp 1s ease-out forwards;
    pointer-events: none;
  }

  @keyframes popUp {
	  0% {
		transform: translateY(0);
		opacity: 1;
	  }

	  100% {
		transform: translateY(-90vh); /* naik sampai atas layar */
		opacity: 0;
	  }
	}

  body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
  }

  .header {
    text-align: center;
    padding: 16px;
    font-size: 18px;
  }

  .content {
    padding: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
  }

  button {
    font-size: 28px;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: #1f1f1f;
    color: white;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  button:active {
    transform: scale(0.92);
  }
</style>
</head>

<body oncontextmenu="return false">

  <div class="header">
    React Live 🎉
  </div>

  <div class="content">
    <div class="grid">
      <button onclick="react('👍')">👍</button>
      <button onclick="react('😂')">😂</button>
      <button onclick="react('❤️')">❤️</button>
      <button onclick="react('🎉')">🎉</button>
      <button onclick="react('😢')">😢</button>
      <button onclick="react('🔥')">🔥</button>
      <button onclick="react('👏')">👏</button>
      <button onclick="react('😍')">😍</button>
      <button onclick="react('😮')">😮</button>
    </div>
  </div>

<script src="/audience.js"></script>
<script>
document.addEventListener("gesturestart", function (e) {
  e.preventDefault();
});

document.addEventListener("dblclick", function(e){
  e.preventDefault();
}, { passive: false });
</script>
</body>
</html>
